repos:
  - repo: local
    hooks:
      - id: lint
        name: Ruff lint
        entry: uv run ruff check .
        language: system
        types: [python]

      - id: format
        name: Ruff format (check)
        entry: uv run ruff format --check .
        language: system
        types: [python]

      - id: static-type-check
        name: Pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: test
        name: Pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
